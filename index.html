<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People of Earth — 2025–2100</title>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #globeViz { width: 100vw; height: 100vh; }

  .overlay { position: fixed; z-index: 10; pointer-events: none; }
  .overlay > * { pointer-events: auto; }

  .title-bar { top: 20px; left: 0; right: 0; text-align: center; }
  .title-bar h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.6; }

  .year-display { top: 50%; right: 40px; transform: translateY(-50%); text-align: right; }
  .year-display .year { font-size: 5rem; font-weight: 100; line-height: 1; opacity: 0.8; font-variant-numeric: tabular-nums; }
  .year-display .info { font-size: 0.85rem; font-weight: 300; opacity: 0.4; margin-top: 8px; }

  .controls {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 20px;
    max-width: 90vw;
  }
  .play-btn {
    background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .play-btn:hover { border-color: rgba(255,255,255,0.7); }
  .slider-container { display: flex; align-items: center; gap: 10px; }
  .slider-container label { font-size: 0.75rem; opacity: 0.4; font-variant-numeric: tabular-nums; }
  input[type="range"] {
    -webkit-appearance: none; width: 300px; height: 3px;
    background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer;
  }
  .speed-btn {
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 0.75rem; cursor: pointer; padding: 4px 8px;
  }
  .speed-btn:hover, .speed-btn.active { color: #fff; }
  .scenario-btn { position: relative; }
  .scenario-btn::after {
    content: attr(data-tip);
    position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; padding: 6px 10px; font-size: 0.7rem; white-space: nowrap;
    color: rgba(255,255,255,0.8); pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .scenario-btn:hover::after { opacity: 1; }

  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 100; transition: opacity 0.5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-text { font-size: 1rem; font-weight: 300; letter-spacing: 0.2em; opacity: 0.5; }
</style>
<script src="//cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-text">Loading...</div>
</div>

<div id="globeViz"></div>

<div class="overlay title-bar">
  <h1>People of Earth</h1>
</div>

<div class="overlay year-display">
  <div class="year" id="year-label">2025</div>
  <div class="info" id="info-label">TFR continues current trend to zero</div>
</div>

<div class="controls">
  <button class="play-btn" id="play-btn" title="Play / Pause">&#9654;</button>
  <div class="slider-container">
    <label>10000 BC</label>
    <input type="range" id="year-slider" min="0" max="341" value="0" step="1">
    <label>2100</label>
  </div>
  <button class="speed-btn active" data-speed="1">1x</button>
  <button class="speed-btn" data-speed="3">3x</button>
  <button class="speed-btn" data-speed="10">10x</button>
  <span style="opacity:0.2; margin:0 4px;">|</span>
  <button class="speed-btn scenario-btn active" data-scenario="linear" data-tip="出生率が現在の下降ペースで低下し続ける（床=0）">Linear</button>
  <button class="speed-btn scenario-btn" data-scenario="stable" data-tip="出生率が2023年の値で固定（これ以上下がらない）">Stable</button>
  <button class="speed-btn scenario-btn" data-scenario="soft" data-tip="出生率の低下が緩やかになり 0.8で下げ止まる">Soft</button>
  <span style="opacity:0.2; margin:0 4px;">|</span>
  <button class="play-btn" id="rotate-btn" title="Auto-rotate" style="font-size:11px;">&#x21BB;</button>
</div>

<script>
(function() {

  // ── Phase 0: Globe + base texture + auto-rotate ──
  var world = new Globe(document.getElementById('globeViz'))
    .globeImageUrl('earth_night_base.jpg')
    .backgroundImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
    .atmosphereColor('rgba(60, 80, 120, 0.3)')
    .atmosphereAltitude(0.12)
    .enablePointerInteraction(false);

  world.pointOfView({ lat: 20, lng: 100, altitude: 2.2 });

  var controls = world.controls();
  if (controls) {
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
  }

  console.log('Phase 0: Globe ready');

  // ── Phase 1: Load dots + render as THREE.Points ──
  var GLOBE_RADIUS = 100;
  var DEG2RAD = Math.PI / 180;

  function polar2Cartesian(lat, lng, alt) {
    var phi = (90 - lat) * DEG2RAD;
    var theta = (90 - lng) * DEG2RAD;
    var r = GLOBE_RADIUS * (1 + alt);
    return [
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    ];
  }

  // Find ThreeGlobe group in scene
  function findThreeGlobe() {
    var found = null;
    world.scene().traverse(function(obj) {
      // ThreeGlobe extends THREE.Group and has many children (layers)
      if (!found && obj.type === 'Group' && obj.children.length > 5) {
        found = obj;
      }
    });
    return found;
  }

  // Scenario definitions
  var SCENARIOS = {
    linear: { name: 'Linear decline', desc: 'TFR continues current trend to zero' },
    stable: { name: 'Stable TFR', desc: 'TFR stays at 2023 level' },
    soft:   { name: 'Soft landing', desc: 'TFR decline slows, floor at 0.8' },
  };
  var currentScenario = 'linear';

  // Population model with 3-layer age cohort tracking
  // Returns { ratio, elderlyPct } for a country at a given year
  var REPLACEMENT_TFR = 2.1;
  var POP_CAP_MULT = 3;
  var YOUNG_YEARS = 15;   // 0-14
  var WORK_YEARS = 50;    // 15-64
  var ELDER_START = 65;

  function computeState(model, year, scenario) {
    var popBase = model.p;
    var tfr0 = model.t;
    var slope = model.s;
    var le = model.l;
    var im = model.i;
    var popCap = popBase * POP_CAP_MULT;

    // Initialize cohorts from 2023 data
    var young = popBase * (model.y0 || 0.2);
    var working = popBase * (1 - (model.y0 || 0.2) - (model.e0 || 0.05));
    var elderly = popBase * (model.e0 || 0.05);

    for (var yr = 2024; yr <= year; yr++) {
      var yearTfr;
      if (scenario === 'stable') {
        yearTfr = tfr0;
      } else if (scenario === 'soft') {
        var elapsed = yr - 2023;
        yearTfr = tfr0 + slope * elapsed * Math.exp(-0.03 * elapsed);
        yearTfr = Math.max(0.8, yearTfr);
      } else {
        yearTfr = tfr0 + slope * (yr - 2023);
        yearTfr = Math.max(0, yearTfr);
      }

      var deathRate = 1 / le;
      var fertilityRatio = yearTfr / REPLACEMENT_TFR;

      // Births go to young
      var births = (working + young * 0.3) * deathRate * fertilityRatio * (1 - im);
      // Aging transitions (fraction per year)
      var youngToWork = young / YOUNG_YEARS;
      var workToElder = working / WORK_YEARS;
      // Deaths: elderly die faster, young/working at base rate
      var youngDeaths = young * deathRate * 0.3;
      var workDeaths = working * deathRate * 0.5;
      var elderDeaths = elderly * deathRate * 2.5;

      young = young + births - youngToWork - youngDeaths;
      working = working + youngToWork - workToElder - workDeaths;
      elderly = elderly + workToElder - elderDeaths;

      young = Math.max(0, young);
      working = Math.max(0, working);
      elderly = Math.max(0, elderly);

      var total = young + working + elderly;
      if (total > popCap) {
        var scale = popCap / total;
        young *= scale; working *= scale; elderly *= scale;
        total = popCap;
      }
    }

    var total = young + working + elderly;
    return {
      ratio: total > 0 ? total / popBase : 0,
      elderlyPct: total > 0 ? elderly / total : 0,
    };
  }

  Promise.all([
    fetch('city_dots.json').then(function(r) { return r.json(); }),
    fetch('pop_model_data.json').then(function(r) { return r.json(); }),
    fetch('pop_history.json').then(function(r) { return r.json(); }),
    fetch('timeline.json').then(function(r) { return r.json(); })
  ]).then(function(results) {
    var dots = results[0];
    var modelData = results[1];
    var popHistory = results[2];
    var TIMELINE = results[3];
    console.log('Data loaded: ' + dots.length + ' dots, ' + TIMELINE.length + ' timeline points');

    // Set slider max to timeline length
    var slider = document.getElementById('year-slider');
    slider.max = TIMELINE.length - 1;
    // Start at 2025
    var startIdx = TIMELINE.indexOf(2025);
    if (startIdx < 0) startIdx = TIMELINE.indexOf(2023);
    slider.value = startIdx;

    // Year display formatting
    function formatYear(yr) {
      if (yr < 0) return Math.abs(yr) + ' BC';
      if (yr === 0) return '1 AD';
      return String(yr);
    }

    // Cache computed states (invalidated on scenario change)
    var stateCache = {};
    function getState(code, year) {
      var key = code + '_' + year + '_' + currentScenario;
      if (stateCache[key]) return stateCache[key];

      var result;
      if (year <= 2023) {
        // Historical: use actual population data
        var h = popHistory[code];
        var m = modelData[code];
        var popBase = m ? m.p : 0;
        if (!h || !popBase) {
          result = { ratio: 0, elderlyPct: 0.05 };
        } else {
          // Find closest year in history
          var pop = h[String(year)];
          if (pop === undefined) {
            // Interpolate between nearest available years
            var years = Object.keys(h).map(Number).sort(function(a,b){return a-b;});
            var lo = years[0], hi = years[years.length-1];
            for (var i = 0; i < years.length - 1; i++) {
              if (years[i] <= year && years[i+1] >= year) {
                lo = years[i]; hi = years[i+1]; break;
              }
            }
            var loP = h[String(lo)] || 0, hiP = h[String(hi)] || 0;
            var t = (hi === lo) ? 0 : (year - lo) / (hi - lo);
            pop = loP + (hiP - loP) * t;
          }
          var ratio = pop / popBase;

          // Age color: use cohort model for 1950+, warm for before
          var elderlyPct = 0.05; // default warm
          if (year >= 1950 && m) {
            // Reverse cohort: compute from 2023 backward
            var s = computeState(m, year, 'stable');
            elderlyPct = s.elderlyPct;
          }
          result = { ratio: ratio, elderlyPct: elderlyPct };
        }
      } else {
        // Future: use model
        var m = modelData[code];
        if (!m) {
          result = { ratio: 1.0, elderlyPct: 0.1 };
        } else {
          result = computeState(m, year, currentScenario);
        }
      }

      stateCache[key] = result;
      return result;
    }

    // Pre-compute per-country dot indices sorted by brightness asc
    var countryDots = {};
    dots.forEach(function(d, i) {
      if (!d.country) return;
      if (!countryDots[d.country]) countryDots[d.country] = [];
      countryDots[d.country].push(i);
    });
    Object.keys(countryDots).forEach(function(code) {
      countryDots[code].sort(function(a, b) { return dots[a].brightness - dots[b].brightness; });
    });

    // Per-dot rank within its country
    var N = dots.length;
    var dotRank = new Int32Array(N);
    var dotCountryCode = new Array(N);
    for (var i = 0; i < N; i++) {
      dotRank[i] = -1;
      dotCountryCode[i] = dots[i].country || '';
    }
    Object.keys(countryDots).forEach(function(code) {
      var indices = countryDots[code];
      for (var rank = 0; rank < indices.length; rank++) {
        dotRank[indices[rank]] = rank;
      }
    });

    // Build geometry with extra capacity for growth dots
    // Max ratio ~3x (cap), so reserve up to 2x extra slots per country
    var GROWTH_SLOTS_PER_COUNTRY = {};
    var totalGrowthSlots = 0;
    Object.keys(countryDots).forEach(function(code) {
      var extra = Math.ceil(countryDots[code].length * 2);
      GROWTH_SLOTS_PER_COUNTRY[code] = extra;
      totalGrowthSlots += extra;
    });
    var TOTAL = N + totalGrowthSlots;
    console.log('Buffer: ' + N + ' base + ' + totalGrowthSlots + ' growth = ' + TOTAL);

    var positions = new Float32Array(TOTAL * 3);
    var colors = new Float32Array(TOTAL * 3);
    var sizes = new Float32Array(TOTAL);
    var alphas = new Float32Array(TOTAL);
    var origSizes = new Float32Array(N); // only for base dots
    var origColors = new Float32Array(TOTAL * 3); // for age color blending

    for (var i = 0; i < N; i++) {
      var d = dots[i];
      var pos = polar2Cartesian(d.lat, d.lon, 0.002);
      positions[i * 3]     = pos[0];
      positions[i * 3 + 1] = pos[1];
      positions[i * 3 + 2] = pos[2];

      // Warm tint
      colors[i * 3]     = Math.min(1.0, (d.r * 1.3) / 255);
      colors[i * 3 + 1] = d.g / 255;
      colors[i * 3 + 2] = (d.b * 0.7) / 255;

      origColors[i * 3]     = colors[i * 3];
      origColors[i * 3 + 1] = colors[i * 3 + 1];
      origColors[i * 3 + 2] = colors[i * 3 + 2];

      var sz = 1.0 + (d.brightness / 127) * 2.5;
      sizes[i] = sz;
      origSizes[i] = sz;
      alphas[i] = 1.0;
    }
    // Growth slots start hidden
    for (var i = N; i < TOTAL; i++) {
      alphas[i] = 0.0;
      sizes[i] = 0.0;
    }

    // Pre-compute growth slot ranges per country
    var growthSlotStart = {};
    var offset = N;
    Object.keys(countryDots).forEach(function(code) {
      growthSlotStart[code] = offset;
      offset += GROWTH_SLOTS_PER_COUNTRY[code];
    });

    // Pre-generate growth dot positions (near brightest existing dots)
    // Seeded pseudo-random for consistency
    var seed = 12345;
    function pseudoRandom() {
      seed = (seed * 16807 + 0) % 2147483647;
      return seed / 2147483647;
    }
    Object.keys(countryDots).forEach(function(code) {
      var indices = countryDots[code];
      var nSlots = GROWTH_SLOTS_PER_COUNTRY[code];
      var slotBase = growthSlotStart[code];
      // Pick from brightest 1/3 as seeds
      var seedPool = indices.slice(Math.floor(indices.length * 0.67));

      for (var s = 0; s < nSlots; s++) {
        var seedIdx = seedPool[Math.floor(pseudoRandom() * seedPool.length)];
        var sd = dots[seedIdx];
        // Small random offset in lat/lon (0.1-0.5 degrees)
        var dlat = (pseudoRandom() - 0.5) * 0.8;
        var dlon = (pseudoRandom() - 0.5) * 0.8;
        var pos = polar2Cartesian(sd.lat + dlat, sd.lon + dlon, 0.002);
        var idx = slotBase + s;
        positions[idx * 3]     = pos[0];
        positions[idx * 3 + 1] = pos[1];
        positions[idx * 3 + 2] = pos[2];
        // Slightly dimmer warm color
        var b = 0.3 + pseudoRandom() * 0.4;
        colors[idx * 3]     = Math.min(1.0, b * 1.3);
        colors[idx * 3 + 1] = b * 0.9;
        colors[idx * 3 + 2] = b * 0.6;
        origColors[idx * 3]     = colors[idx * 3];
        origColors[idx * 3 + 1] = colors[idx * 3 + 1];
        origColors[idx * 3 + 2] = colors[idx * 3 + 2];
        sizes[idx] = 1.0 + pseudoRandom() * 1.5;
      }
    });

    var geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geometry.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));

    var pointsMaterial = new THREE.ShaderMaterial({
      vertexShader: [
        'attribute vec3 aColor;',
        'attribute float aSize;',
        'attribute float aAlpha;',
        'varying vec3 vColor;',
        'varying float vAlpha;',
        'void main() {',
        '  vColor = aColor;',
        '  vAlpha = aAlpha;',
        '  vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);',
        '  gl_PointSize = clamp(aSize * (200.0 / -mvPosition.z), 1.0, 64.0);',
        '  gl_Position = projectionMatrix * mvPosition;',
        '}',
      ].join('\n'),
      fragmentShader: [
        'varying vec3 vColor;',
        'varying float vAlpha;',
        'void main() {',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  if (d > 0.5) discard;',
        '  float glow = 1.0 - smoothstep(0.0, 0.5, d);',
        '  glow = glow * glow;',
        '  gl_FragColor = vec4(vColor * glow, glow * vAlpha);',
        '}',
      ].join('\n'),
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    var pointCloud = new THREE.Points(geometry, pointsMaterial);

    // Add to ThreeGlobe group for zoom/rotation tracking
    // Wait a tick for globe to fully initialize
    setTimeout(function() {
      var threeGlobe = findThreeGlobe();
      if (threeGlobe) {
        threeGlobe.add(pointCloud);
        console.log('Phase 1: Points added to ThreeGlobe group (' + threeGlobe.children.length + ' children)');
      } else {
        // Fallback: add to scene (won't track rotation perfectly)
        world.scene().add(pointCloud);
        console.log('Phase 1: Fallback - Points added to scene');
      }
    }, 500);

    // ── Phase 2: Year slider ──
    // Age color: warm (young) → cool (elderly)
    // elderlyPct 0.05 → orange, 0.40 → blue-white
    function ageColorShift(origR, origG, origB, elderlyPct) {
      // t: 0 = young (warm), 1 = very old (cold)
      var t = Math.min(1.0, Math.max(0, (elderlyPct - 0.05) / 0.35));
      // Warm: original warm tint. Cold: shift toward blue-white
      var r = origR * (1 - t * 0.6);
      var g = origG * (1 - t * 0.2);
      var b = origB + (1.0 - origB) * t * 0.7;
      return [r, g, b];
    }

    function updateYear(year) {
      var alphaAttr = geometry.getAttribute('aAlpha');
      var sizeAttr = geometry.getAttribute('aSize');
      var colorAttr = geometry.getAttribute('aColor');

      // Era transition: 0 = ancient fire, 1 = modern electric
      // -10000~1800: fire, 1800~1950: transition, 1950+: electric
      var era;
      if (year <= 1800) {
        era = 0;
      } else if (year <= 1950) {
        era = (year - 1800) / 150; // 0..1
      } else {
        era = 1;
      }

      // For pre-statistics era (< 1950): normalize ratios so max country = 1.0
      var useRelative = (year < 1950);

      // Cache states per country
      var states = {};
      var maxRatio = 0;
      Object.keys(countryDots).forEach(function(code) {
        states[code] = getState(code, year);
        if (states[code].ratio > maxRatio) maxRatio = states[code].ratio;
      });

      // Apply dot color based on era
      function eraColor(idx, elderlyPct) {
        var origR = origColors[idx*3];
        var origG = origColors[idx*3+1];
        var origB = origColors[idx*3+2];

        if (era < 1) {
          // Fire color: deep red-orange, desaturated green/blue
          var fireR = Math.min(1.0, origR * 1.2 + 0.3);
          var fireG = origR * 0.3;
          var fireB = origR * 0.05;
          // Blend fire → electric by era
          var r = fireR * (1 - era) + origR * era;
          var g = fireG * (1 - era) + origG * era;
          var b = fireB * (1 - era) + origB * era;
          return [r, g, b];
        } else {
          // Modern: age color shift
          return ageColorShift(origR, origG, origB, elderlyPct);
        }
      }

      // Update base dots
      for (var i = 0; i < N; i++) {
        var code = dotCountryCode[i];
        if (!code || dotRank[i] < 0) {
          alphaAttr.array[i] = (year >= 1950) ? 1.0 : 0.0;
          sizeAttr.array[i] = origSizes[i];
          continue;
        }

        var state = states[code] || { ratio: 1.0, elderlyPct: 0.1 };
        var ratio = state.ratio;

        // Normalize for ancient era
        if (useRelative && maxRatio > 0) {
          ratio = ratio / maxRatio;
        }

        var brightness_factor, size_factor;
        if (useRelative) {
          // Ancient: linear scale, no power curve crushing
          brightness_factor = Math.max(0.08, ratio);
          size_factor = 0.5 + ratio * 0.8;
        } else if (ratio < 1) {
          brightness_factor = Math.pow(ratio, 1.5);
          size_factor = Math.pow(ratio, 1.2);
        } else {
          brightness_factor = Math.min(2.0, Math.pow(ratio, 0.6));
          size_factor = Math.min(1.8, Math.pow(ratio, 0.4));
        }

        // Ancient fire: bigger, softer dots
        var sizeMultiplier = 1.0 + (1 - era) * 0.8;

        alphaAttr.array[i] = Math.max(0.05, brightness_factor);
        sizeAttr.array[i] = origSizes[i] * size_factor * sizeMultiplier;

        // Color
        var c = eraColor(i, state.elderlyPct);
        colorAttr.array[i*3]   = c[0];
        colorAttr.array[i*3+1] = c[1];
        colorAttr.array[i*3+2] = c[2];
      }

      // Update growth slots
      Object.keys(countryDots).forEach(function(code) {
        var state = states[code] || { ratio: 1.0, elderlyPct: 0.1 };
        var ratio = state.ratio;
        if (useRelative && maxRatio > 0) ratio = ratio / maxRatio;
        // Ancient normalized ratio won't exceed 1, so growth slots not needed
        var nSlots = GROWTH_SLOTS_PER_COUNTRY[code];
        var slotBase = growthSlotStart[code];

        if (ratio > 1) {
          var growthFraction = Math.min(1.0, (ratio - 1) / 2.0);
          var nShow = Math.floor(nSlots * growthFraction);
          for (var s = 0; s < nSlots; s++) {
            var idx = slotBase + s;
            if (s < nShow) {
              alphaAttr.array[idx] = 0.6 + growthFraction * 0.4;
              var c = eraColor(idx, state.elderlyPct);
              colorAttr.array[idx*3]   = c[0];
              colorAttr.array[idx*3+1] = c[1];
              colorAttr.array[idx*3+2] = c[2];
            } else {
              alphaAttr.array[idx] = 0.0;
            }
          }
        } else {
          for (var s = 0; s < nSlots; s++) {
            alphaAttr.array[slotBase + s] = 0.0;
          }
        }
      });

      alphaAttr.needsUpdate = true;
      sizeAttr.needsUpdate = true;
      colorAttr.needsUpdate = true;
      document.getElementById('year-label').textContent = formatYear(Math.round(year));

      // Grey out scenario buttons for historical years
      var inFuture = year > 2023;
      document.querySelectorAll('.scenario-btn').forEach(function(btn) {
        btn.style.opacity = inFuture ? '' : '0.3';
        btn.style.pointerEvents = inFuture ? '' : 'none';
      });
    }

    // ── Controls ──
    var currentIdx = startIdx;
    var currentYear = TIMELINE[currentIdx];
    var playing = false;
    var speed = 1;
    var lastTick = 0;
    var TICK_INTERVAL = 300;

    slider.addEventListener('input', function() {
      currentIdx = parseInt(slider.value);
      currentYear = TIMELINE[currentIdx];
      updateYear(currentYear);
    });

    var playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', function() {
      playing = !playing;
      playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
      if (playing) {
        if (currentIdx >= TIMELINE.length - 1) { currentIdx = 0; slider.value = 0; }
        lastTick = performance.now();
        requestAnimationFrame(animate);
      }
    });

    function animate() {
      if (!playing) return;
      var now = performance.now();
      if (now - lastTick >= TICK_INTERVAL) {
        currentIdx += speed;
        if (currentIdx >= TIMELINE.length) {
          currentIdx = TIMELINE.length - 1;
          playing = false;
          playBtn.innerHTML = '&#9654;';
        }
        currentYear = TIMELINE[currentIdx];
        slider.value = currentIdx;
        updateYear(currentYear);
        lastTick = now;
      }
      requestAnimationFrame(animate);
    }

    document.querySelectorAll('.speed-btn:not(.scenario-btn)').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.speed-btn:not(.scenario-btn)').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        speed = parseInt(btn.dataset.speed);
      });
    });

    // Scenario buttons
    var infoLabel = document.getElementById('info-label');
    document.querySelectorAll('.scenario-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.scenario-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentScenario = btn.dataset.scenario;
        stateCache = {}; // invalidate cache
        infoLabel.textContent = SCENARIOS[currentScenario].desc;
        updateYear(currentYear);
      });
    });
    infoLabel.textContent = SCENARIOS[currentScenario].desc;

    // Rotate toggle
    var rotateBtn = document.getElementById('rotate-btn');
    var rotating = true;
    rotateBtn.addEventListener('click', function() {
      rotating = !rotating;
      if (controls) controls.autoRotate = rotating;
      rotateBtn.style.opacity = rotating ? '1' : '0.3';
    });

    // Ready
    updateYear(currentYear);
    document.getElementById('loading').classList.add('hidden');
    console.log('Phase 2: All ready');

  }).catch(function(err) {
    console.error('Failed to load data:', err);
    document.querySelector('.loading-text').textContent = 'Error: ' + err.message;
  });

})();
</script>
</body>
</html>
