<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUMANS OF EARTH</title>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #globeViz { width: 100vw; height: 100vh; }

  .overlay { position: fixed; z-index: 10; pointer-events: none; }
  .overlay > * { pointer-events: none; }

  .title-bar { top: 20px; left: 0; right: 0; text-align: center; }
  .title-bar h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.6; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 20px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .footer-top {
    display: flex; align-items: center; gap: 12px; width: 100%; max-width: 700px;
  }
  .footer-top .year { font-size: 1.4rem; font-weight: 100; opacity: 0.7; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 5em; }
  .footer-top .pop { font-size: 0.8rem; font-weight: 300; opacity: 0.4; white-space: nowrap; }
  .footer-info { font-size: 0.6rem; font-weight: 300; opacity: 0.25; pointer-events: none; }

  .controls {
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
  }
  .play-btn {
    background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .play-btn:hover { border-color: rgba(255,255,255,0.7); }
  input[type="range"] {
    -webkit-appearance: none; flex: 1; min-width: 80px; height: 3px;
    background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer;
  }
  .speed-btn {
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 0.75rem; cursor: pointer; padding: 4px 8px;
  }
  .speed-btn:hover, .speed-btn.active { color: #fff; }
  .scenario-btn { position: relative; }
  .scenario-btn::after {
    content: attr(data-tip);
    position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; padding: 6px 10px; font-size: 0.7rem; white-space: nowrap;
    color: rgba(255,255,255,0.8); pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .scenario-btn:hover::after { opacity: 1; }

  .settings-panel {
    position: fixed; bottom: 100px; right: 20px; z-index: 10;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 12px 16px; display: flex; flex-direction: column; gap: 8px;
    transition: opacity 0.2s;
  }
  .settings-panel.hidden { opacity: 0; pointer-events: none; }
  .settings-group { display: flex; align-items: center; gap: 8px; }
  .settings-label { font-size: 0.65rem; opacity: 0.4; min-width: 55px; text-align: right; }

  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 100; transition: opacity 0.5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-text { font-size: 1rem; font-weight: 300; letter-spacing: 0.2em; opacity: 0.5; }

  /* ── Mobile (<768px) ── */
  @media (max-width: 767px) {
    .title-bar h1 { font-size: 0.9rem; letter-spacing: 0.15em; }

    .footer { padding: 6px 10px 8px; }
    .footer-top {
      flex-wrap: nowrap; gap: 6px;
    }
    .footer-top .year { font-size: 0.95rem; min-width: auto; }
    .footer-top .pop { font-size: 0.65rem; }
    .footer-info { font-size: 0.55rem; }

    .play-btn { width: 32px; height: 32px; font-size: 12px; flex-shrink: 0; }

    .settings-panel {
      right: 10px; left: 10px; bottom: 70px;
      border-radius: 10px;
    }

    .scenario-btn::after { display: none; }
  }

  /* ── Small mobile (<400px) ── */
  @media (max-width: 399px) {
    .title-bar h1 { font-size: 0.75rem; }
    .footer-top .year { font-size: 0.85rem; }
    .play-btn { width: 28px; height: 28px; font-size: 11px; }
  }
</style>
<script src="//cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-text">Loading...</div>
</div>

<div id="globeViz"></div>

<div class="overlay title-bar">
  <h1><span id="main-title">HUMANS OF EARTH</span> <span id="sub-title" style="font-size:0.65em; opacity:0.5;"></span></h1>
</div>

<div class="footer">
  <div class="footer-top">
    <span class="year" id="year-label">2025</span>
    <div class="controls">
      <button class="play-btn" id="play-btn" title="Play / Pause (Space)">&#9654;</button>
      <input type="range" id="year-slider" min="0" max="100" value="0" step="1" style="flex:1; min-width:150px;">
      <button class="play-btn" id="rotate-btn" title="Rotate (R)" style="font-size:11px;">&#x21BB;</button>
      <button class="play-btn" id="settings-btn" title="Settings" style="font-size:13px;">&#9881;</button>
    </div>
    <span class="pop" id="world-pop-label"></span>
  </div>
  <div class="footer-info">
    <span id="info-label"></span>
    <span id="legend-label" style="margin-left:8px;"></span>
  </div>
</div>

<div id="settings-panel" class="settings-panel hidden">
  <div class="settings-group">
    <span class="settings-label">Speed</span>
    <button class="speed-btn active" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="3">3x</button>
    <button class="speed-btn" data-speed="10">10x</button>
  </div>
  <div class="settings-group">
    <span class="settings-label">Scenario</span>
    <button class="speed-btn scenario-btn active" data-scenario="linear" data-tip="TFR continues current decline to zero">Linear</button>
    <button class="speed-btn scenario-btn" data-scenario="stable" data-tip="TFR stays at 2023 level">Stable</button>
    <button class="speed-btn scenario-btn" data-scenario="soft" data-tip="TFR decline slows, floor at 0.8">Soft</button>
  </div>
  <div class="settings-group">
    <span class="settings-label">Display</span>
    <button class="speed-btn" id="age-btn">Age color</button>
    <button class="speed-btn" id="migration-btn">Migration</button>
  </div>
  <div style="margin-top:4px; font-size:0.6rem; opacity:0.3;" id="shortcuts-label"></div>
  <div class="settings-group" style="margin-top:2px;">
    <span class="settings-label">Lang</span>
    <button class="speed-btn" id="lang-btn"></button>
  </div>
</div>

<script>
(function() {

  // ── i18n ──
  var urlLang = new URLSearchParams(window.location.search).get('lang');
  var LANG = urlLang || ((navigator.language || '').startsWith('ja') ? 'ja' : 'en');
  var I18N = {
    en: {
      title: 'HUMANS OF EARTH',
      subtitle: 'Lights of Life',
      dotLegend: '\u25CF = 50,000 people',
      dotLegendAncient: ' (estimated placement)',
      scenarioLinear: 'TFR continues current trend to zero',
      scenarioStable: 'TFR stays at 2023 level',
      scenarioSoft: 'TFR decline slows, floor at 0.8',
      tipLinear: 'TFR continues current decline to zero',
      tipStable: 'TFR stays at 2023 level',
      tipSoft: 'TFR decline slows, floor at 0.8',
      speed: 'Speed',
      scenario: 'Scenario',
      display: 'Display',
      ageColor: 'Age color',
      rotate: 'Rotate',
      shortcuts: '\u2190 \u2192 step \u00A0 Space play/pause',
      ageLegend: '<span style="color:#ff6600;">\u25CF</span><small> ~5%</small> <span style="color:#ddcc00;">\u25CF</span><small> ~20%</small> <span style="color:#44cc88;">\u25CF</span><small> ~30%</small> <span style="color:#4488dd;">\u25CF</span><small> ~45%</small> <span style="color:#8855cc;">\u25CF</span><small> ~60%</small> <span style="cursor:help;opacity:0.5;" title="Share of population aged 65+">(65+ %)</span>',
      migration: 'Migration',
      langBtn: 'JA',
    },
    ja: {
      title: 'HUMANS OF EARTH',
      subtitle: '\u4EBA\u306E\u706F',
      dotLegend: '\u25CF = 5\u4E07\u4EBA',
      dotLegendAncient: '\uFF08\u63A8\u5B9A\u914D\u7F6E\uFF09',
      scenarioLinear: '\u51FA\u751F\u7387\u304C\u73FE\u5728\u306E\u30DA\u30FC\u30B9\u3067\u4F4E\u4E0B\u3057\u7D9A\u3051\u308B',
      scenarioStable: '\u51FA\u751F\u7387\u304C2023\u5E74\u306E\u5024\u3067\u56FA\u5B9A',
      scenarioSoft: '\u51FA\u751F\u7387\u306E\u4F4E\u4E0B\u304C\u7DE9\u3084\u304B\u306B\u306A\u308A 0.8\u3067\u4E0B\u3052\u6B62\u307E\u308B',
      tipLinear: '\u51FA\u751F\u7387\u304C\u73FE\u5728\u306E\u4E0B\u964D\u30DA\u30FC\u30B9\u3067\u7D9A\u304F\uFF08\u5E8A=0\uFF09',
      tipStable: '\u51FA\u751F\u7387\u304C2023\u5E74\u306E\u5024\u3067\u56FA\u5B9A',
      tipSoft: '\u51FA\u751F\u7387\u306E\u4F4E\u4E0B\u304C\u7DE9\u3084\u304B\u306B\u306A\u308A 0.8\u3067\u4E0B\u3052\u6B62\u307E\u308B',
      speed: '\u901F\u5EA6',
      scenario: '\u30B7\u30CA\u30EA\u30AA',
      display: '\u8868\u793A',
      ageColor: '\u5E74\u9F62\u8272',
      rotate: '\u56DE\u8EE2',
      shortcuts: '\u2190 \u2192 1\u30B9\u30C6\u30C3\u30D7 \u00A0 Space \u518D\u751F/\u505C\u6B62',
      ageLegend: '<span style="color:#ff6600;">\u25CF</span><small> ~5%</small> <span style="color:#ddcc00;">\u25CF</span><small> ~20%</small> <span style="color:#44cc88;">\u25CF</span><small> ~30%</small> <span style="color:#4488dd;">\u25CF</span><small> ~45%</small> <span style="color:#8855cc;">\u25CF</span><small> ~60%</small> <span style="cursor:help;opacity:0.5;" title="65\u6B73\u4EE5\u4E0A\u4EBA\u53E3\u306E\u5272\u5408">(65+ %)</span>',
      migration: '移民フロー',
      langBtn: 'EN',
    }
  };
  var t = I18N[LANG];

  // Apply static text
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('sub-title').textContent = t.subtitle;
  document.querySelectorAll('.settings-label').forEach(function(el, i) {
    el.textContent = [t.speed, t.scenario, t.display][i] || el.textContent;
  });
  document.getElementById('age-btn').textContent = t.ageColor;
  document.getElementById('migration-btn').textContent = t.migration;
  document.getElementById('rotate-btn').textContent = t.rotate;
  document.querySelectorAll('.scenario-btn').forEach(function(btn) {
    btn.setAttribute('data-tip', t['tip' + btn.dataset.scenario.charAt(0).toUpperCase() + btn.dataset.scenario.slice(1)]);
  });
  document.getElementById('shortcuts-label').textContent = t.shortcuts;
  document.getElementById('lang-btn').textContent = t.langBtn;
  document.getElementById('lang-btn').addEventListener('click', function() {
    var newLang = LANG === 'ja' ? 'en' : 'ja';
    var url = new URL(window.location);
    url.searchParams.set('lang', newLang);
    window.location = url;
  });

  // ── Globe ──
  var world = new Globe(document.getElementById('globeViz'))
    .globeImageUrl('earth_night_base.jpg')
    .backgroundImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
    .atmosphereColor('rgba(60, 80, 120, 0.3)')
    .atmosphereAltitude(0.12)
    .enablePointerInteraction(false);

  var isMobile = window.innerWidth < 768;
  world.pointOfView({ lat: 20, lng: 100, altitude: isMobile ? 3.5 : 2.2 });

  var controls = world.controls();
  if (controls) {
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
  }

  // ── Constants ──
  var GLOBE_RADIUS = 100;
  var DEG2RAD = Math.PI / 180;

  function polar2Cartesian(lat, lng, alt) {
    var phi = (90 - lat) * DEG2RAD;
    var theta = (90 - lng) * DEG2RAD;
    var r = GLOBE_RADIUS * (1 + alt);
    return [
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    ];
  }

  function formatYear(yr) {
    if (LANG === 'ja') {
      if (yr < 0) return '\u7D00\u5143\u524D' + Math.abs(yr) + '\u5E74'; // 紀元前X年
      if (yr === 0) return '\u7D00\u5143\u5143\u5E74';                    // 紀元元年
      return yr + '\u5E74';                                                // X年
    }
    if (yr < 0) return Math.abs(yr) + ' BC';
    if (yr === 0) return '1 AD';
    return String(yr);
  }

  function formatPop(n) {
    if (LANG === 'ja') {
      if (n >= 1e8) return (n/1e8).toFixed(1) + '\u5104\u4EBA';           // 億人
      if (n >= 1e4) return Math.round(n/1e4).toLocaleString() + '\u4E07\u4EBA'; // 万人
      return Math.round(n) + '\u4EBA';                                      // 人
    }
    if (n >= 1e9) return (n/1e9).toFixed(1) + ' billion';
    if (n >= 1e6) return Math.round(n/1e6) + ' million';
    if (n >= 1e3) return Math.round(n/1e3).toLocaleString() + ' thousand';
    return String(Math.round(n));
  }

  // ── Load data ──
  Promise.all([
    fetch('historical_dots_packed.json').then(function(r) { return r.json(); }),
    fetch('timeline.json').then(function(r) { return r.json(); }),
    fetch('pop_history.json').then(function(r) { return r.json(); }),
    fetch('pop_model_data.json').then(function(r) { return r.json(); }),
    fetch('gdp_ssp.json').then(function(r) { return r.json(); }),
    fetch('lang_groups.json').then(function(r) { return r.json(); }),
    fetch('countries_coords.csv').then(function(r) { return r.text(); })
  ]).then(function(results) {
    var packedData = results[0]; // {countries: [...], dots: {year: "lat,lon,cidx;..."}}
    var TIMELINE = results[1];
    var popHistory = results[2];

    var modelData = results[3];
    var gdpData = results[4];    // { ISO3: { "2020": val, "2025": val, ... } }
    var langGroups = results[5]; // { "en": [...], "fr": [...], ... }

    // Parse country coords CSV → { ISO3: { lat, lon } }
    var countryCoords = {};
    results[6].split('\n').slice(1).forEach(function(line) {
      var cols = line.split(',').map(function(c) { return c.trim().replace(/"/g, ''); });
      if (cols[2] && cols[4] && cols[5]) {
        countryCoords[cols[2]] = { lat: parseFloat(cols[4]), lon: parseFloat(cols[5]) };
      }
    });

    var COUNTRY_CODES = packedData.countries; // index → ISO code
    console.log('Countries: ' + COUNTRY_CODES.length);

    // ── Migration engine ──
    var EMIGRATION_RATE = 0.03;
    var DISTANCE_DECAY = 1.5;
    var LANG_BONUS = 3.0;
    var MIN_DISTANCE_KM = 500;

    // Build language lookup: ISO3 → Set of language codes
    var countryLangs = {};
    Object.keys(langGroups).forEach(function(lang) {
      langGroups[lang].forEach(function(code) {
        if (!countryLangs[code]) countryLangs[code] = [];
        countryLangs[code].push(lang);
      });
    });

    function shareLang(a, b) {
      var la = countryLangs[a], lb = countryLangs[b];
      if (!la || !lb) return false;
      for (var i = 0; i < la.length; i++) {
        if (lb.indexOf(la[i]) >= 0) return true;
      }
      return false;
    }

    // Haversine distance in km
    function haversineKm(lat1, lon1, lat2, lon2) {
      var R = 6371;
      var dLat = (lat2 - lat1) * DEG2RAD;
      var dLon = (lon2 - lon1) * DEG2RAD;
      var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * DEG2RAD) * Math.cos(lat2 * DEG2RAD) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Pre-compute distance matrix for countries in COUNTRY_CODES
    var distMatrix = {}; // "ISO3a_ISO3b" → km
    COUNTRY_CODES.forEach(function(a) {
      var ca = countryCoords[a];
      if (!ca) return;
      COUNTRY_CODES.forEach(function(b) {
        if (a === b) return;
        var key = a + '_' + b;
        if (distMatrix[key]) return;
        var cb = countryCoords[b];
        if (!cb) return;
        var d = Math.max(MIN_DISTANCE_KM, haversineKm(ca.lat, ca.lon, cb.lat, cb.lon));
        distMatrix[key] = d;
        distMatrix[b + '_' + a] = d;
      });
    });

    // Interpolate GDP from 5-year steps
    function getGdp(code, year) {
      var g = gdpData[code];
      if (!g) return 0;
      var y = Math.max(2020, Math.min(2100, year));
      var lo = Math.floor(y / 5) * 5;
      var hi = lo + 5;
      if (hi > 2100) return g['2100'] || 0;
      var vLo = g[String(lo)] || 0;
      var vHi = g[String(hi)] || vLo;
      return vLo + (vHi - vLo) * (y - lo) / 5;
    }

    // Pre-compute migration weights per source country (static part: distance + language)
    // Dynamic part (GDP) changes per year, so we compute full weights at runtime
    // But we can pre-compute distance^decay and language bonus
    var migrationTargets = {}; // sourceISO3 → [{ code, distWeight, langBonus }, ...]
    COUNTRY_CODES.forEach(function(src) {
      if (!countryCoords[src]) return;
      var targets = [];
      COUNTRY_CODES.forEach(function(dst) {
        if (src === dst) return;
        var d = distMatrix[src + '_' + dst];
        if (!d) return;
        targets.push({
          code: dst,
          distWeight: 1 / Math.pow(d, DISTANCE_DECAY),
          langBonus: shareLang(src, dst) ? LANG_BONUS : 1.0
        });
      });
      migrationTargets[src] = targets;
    });

    // Main migration-aware population engine
    // Returns { ISO3: pop } for all countries at the target year
    var migrationPopCache = {}; // "scenario_year" → { ISO3: pop }

    function computeAllFuturePop(targetYear, scenario) {
      var cacheKey = scenario + '_' + targetYear;
      if (migrationPopCache[cacheKey]) return migrationPopCache[cacheKey];

      // Initialize with 2023 populations
      var pop = {};
      COUNTRY_CODES.forEach(function(code) {
        var m = modelData[code];
        if (m) pop[code] = m.p;
      });

      for (var yr = 2024; yr <= targetYear; yr++) {
        // ① Natural growth (same as computeFuturePop)
        var naturalPop = {};
        var surplus = {};
        COUNTRY_CODES.forEach(function(code) {
          var m = modelData[code];
          if (!m || !pop[code]) return;
          var tfr0 = m.t, slope = m.s, le = m.l, im = m.i;
          var popCap = m.p * 3;
          var yearTfr;
          if (scenario === 'stable') yearTfr = tfr0;
          else if (scenario === 'soft') {
            var elapsed = yr - 2023;
            yearTfr = Math.max(0.8, tfr0 + slope * elapsed * Math.exp(-0.03 * elapsed));
          } else yearTfr = Math.max(0, tfr0 + slope * (yr - 2023));
          var deathRate = 1 / le;
          var birthRate = deathRate * (yearTfr / 2.1) * (1 - im);
          var newPop = pop[code] * (1 + birthRate - deathRate);
          naturalPop[code] = Math.max(0, Math.min(newPop, popCap));
          surplus[code] = Math.max(0, naturalPop[code] - pop[code]);
        });

        // ② Compute emigration and distribute to destinations
        var immigrants = {};
        COUNTRY_CODES.forEach(function(code) { immigrants[code] = 0; });

        COUNTRY_CODES.forEach(function(src) {
          var emig = surplus[src] * EMIGRATION_RATE;
          if (emig < 1 || !migrationTargets[src]) return;

          // Compute weights with GDP for this year
          var targets = migrationTargets[src];
          var totalWeight = 0;
          var weights = new Array(targets.length);
          for (var i = 0; i < targets.length; i++) {
            var dst = targets[i];
            var gdpPC = pop[dst.code] > 0 ? getGdp(dst.code, yr) * 1e9 / pop[dst.code] : 0;
            gdpPC = Math.min(gdpPC, 150000); // Cap to prevent small oil-rich states from dominating
            var w = gdpPC * dst.distWeight * dst.langBonus;
            weights[i] = w;
            totalWeight += w;
          }
          if (totalWeight <= 0) return;

          // Distribute emigrants proportionally
          for (var i = 0; i < targets.length; i++) {
            immigrants[targets[i].code] += emig * (weights[i] / totalWeight);
          }
          // Subtract emigrants from source
          naturalPop[src] = Math.max(0, naturalPop[src] - emig);
        });

        // ③ Apply immigration
        COUNTRY_CODES.forEach(function(code) {
          pop[code] = (naturalPop[code] || 0) + immigrants[code];
        });
      }

      migrationPopCache[cacheKey] = pop;
      return pop;
    }

    // Compute top migration flows for arc visualization
    var migrationFlowCache = {};
    function getTopFlows(year, scenario, topN) {
      topN = topN || 20;
      var cacheKey = scenario + '_' + year;
      if (migrationFlowCache[cacheKey]) return migrationFlowCache[cacheKey];

      // We need pop at year-1 to compute flows for this year
      var pop = {};
      COUNTRY_CODES.forEach(function(code) {
        var m = modelData[code];
        if (m) pop[code] = m.p;
      });

      var lastFlows = [];
      for (var yr = 2024; yr <= year; yr++) {
        var flows = [];
        COUNTRY_CODES.forEach(function(src) {
          var m = modelData[src];
          if (!m || !pop[src]) return;
          var tfr0 = m.t, slope = m.s, le = m.l, im = m.i;
          var yearTfr;
          if (scenario === 'stable') yearTfr = tfr0;
          else if (scenario === 'soft') {
            var elapsed = yr - 2023;
            yearTfr = Math.max(0.8, tfr0 + slope * elapsed * Math.exp(-0.03 * elapsed));
          } else yearTfr = Math.max(0, tfr0 + slope * (yr - 2023));

          var deathRate = 1 / le;
          var birthRate = deathRate * (yearTfr / 2.1) * (1 - im);
          var newPop = pop[src] * (1 + birthRate - deathRate);
          var surplus = Math.max(0, newPop - pop[src]);
          var emig = surplus * EMIGRATION_RATE;
          if (emig < 1000 || !migrationTargets[src]) return;

          var targets = migrationTargets[src];
          var totalWeight = 0;
          var weights = [];
          for (var i = 0; i < targets.length; i++) {
            var dst = targets[i];
            var gdpPC = pop[dst.code] > 0 ? getGdp(dst.code, yr) * 1e9 / pop[dst.code] : 0;
            gdpPC = Math.min(gdpPC, 150000);
            var w = gdpPC * dst.distWeight * dst.langBonus;
            weights.push(w);
            totalWeight += w;
          }
          if (totalWeight <= 0) return;

          for (var i = 0; i < targets.length; i++) {
            var amount = emig * (weights[i] / totalWeight);
            if (amount > 5000) {
              flows.push({ src: src, dst: targets[i].code, amount: amount });
            }
          }
        });

        // Update pop for next year
        var naturalPop = {};
        COUNTRY_CODES.forEach(function(code) {
          var m = modelData[code];
          if (!m || !pop[code]) return;
          var tfr0 = m.t, slope = m.s, le = m.l, im = m.i;
          var yearTfr;
          if (scenario === 'stable') yearTfr = tfr0;
          else if (scenario === 'soft') {
            var elapsed = yr - 2023;
            yearTfr = Math.max(0.8, tfr0 + slope * elapsed * Math.exp(-0.03 * elapsed));
          } else yearTfr = Math.max(0, tfr0 + slope * (yr - 2023));
          var deathRate = 1 / le;
          var birthRate = deathRate * (yearTfr / 2.1) * (1 - im);
          naturalPop[code] = Math.max(0, Math.min(pop[code] * (1 + birthRate - deathRate), m.p * 3));
        });
        COUNTRY_CODES.forEach(function(code) { pop[code] = naturalPop[code] || pop[code]; });

        lastFlows = flows;
      }

      // Sort by amount, take top N
      lastFlows.sort(function(a, b) { return b.amount - a.amount; });
      var topFlows = lastFlows.slice(0, topN);
      migrationFlowCache[cacheKey] = topFlows;
      return topFlows;
    }

    // Unpack dots: "lat*10,lon*10,cidx;..." → [[lat, lon, countryIdx], ...]
    var allDots = {};
    Object.keys(packedData.dots).forEach(function(yr) {
      var str = packedData.dots[yr];
      if (!str) { allDots[yr] = []; return; }
      var pairs = str.split(';');
      var arr = new Array(pairs.length);
      for (var i = 0; i < pairs.length; i++) {
        var parts = pairs[i].split(',');
        arr[i] = [parseInt(parts[0]) / 10, parseInt(parts[1]) / 10, parseInt(parts[2])];
      }
      allDots[yr] = arr;
    });
    packedData = null; // free memory

    // ── Setup slider ──
    var slider = document.getElementById('year-slider');
    slider.max = TIMELINE.length - 1;
    var startIdx = TIMELINE.indexOf(2025);
    if (startIdx < 0) startIdx = TIMELINE.indexOf(2023);
    if (startIdx < 0) startIdx = TIMELINE.length - 1;
    slider.value = startIdx;

    // ── Find max dots for buffer sizing ──
    var MAX_DOTS = 0;
    Object.keys(allDots).forEach(function(yr) {
      if (allDots[yr].length > MAX_DOTS) MAX_DOTS = allDots[yr].length;
    });
    console.log('Max dots: ' + MAX_DOTS);

    // ── Build geometry ──
    var positions = new Float32Array(MAX_DOTS * 3);
    var dotColors = new Float32Array(MAX_DOTS * 3);
    var dotSizes = new Float32Array(MAX_DOTS);
    var dotAlphas = new Float32Array(MAX_DOTS);

    var geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(dotColors, 3));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(dotSizes, 1));
    geometry.setAttribute('aAlpha', new THREE.BufferAttribute(dotAlphas, 1));
    geometry.setDrawRange(0, 0);

    // ── Shader with wobble for ancient dots ──
    var material = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0.0 },
        uWobble: { value: 1.0 }  // 1.0 = full wobble (ancient), 0.0 = none (modern)
      },
      vertexShader: [
        'uniform float uTime;',
        'uniform float uWobble;',
        'attribute vec3 aColor;',
        'attribute float aSize;',
        'attribute float aAlpha;',
        'varying vec3 vColor;',
        'varying float vAlpha;',
        'void main() {',
        '  vColor = aColor;',
        '  vAlpha = aAlpha;',
        '  float id = position.x * 13.7 + position.y * 7.3 + position.z * 11.1;',
        '  vec3 wobble = uWobble * vec3(',
        '    sin(uTime * 0.4 + id) * 0.15,',
        '    cos(uTime * 0.3 + id * 1.3) * 0.15,',
        '    sin(uTime * 0.5 + id * 0.7) * 0.15',
        '  );',
        '  vec4 mvPosition = modelViewMatrix * vec4(position + wobble, 1.0);',
        '  gl_PointSize = clamp(aSize * (200.0 / -mvPosition.z), 1.0, 64.0);',
        '  gl_Position = projectionMatrix * mvPosition;',
        '}',
      ].join('\n'),
      fragmentShader: [
        'varying vec3 vColor;',
        'varying float vAlpha;',
        'void main() {',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  if (d > 0.5) discard;',
        '  float glow = 1.0 - smoothstep(0.0, 0.5, d);',
        '  glow = glow * glow;',
        '  gl_FragColor = vec4(vColor * glow, glow * vAlpha);',
        '}',
      ].join('\n'),
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    var pointCloud = new THREE.Points(geometry, material);

    // Add to ThreeGlobe
    setTimeout(function() {
      var found = null;
      world.scene().traverse(function(obj) {
        if (!found && obj.type === 'Group' && obj.children.length > 5) found = obj;
      });
      (found || world.scene()).add(pointCloud);
      console.log('Points added');
    }, 500);

    // ── World population helper ──
    function getWorldPop(year) {
      var h = popHistory['OWID_WRL'];
      if (!h) return 0;
      var p = h[String(year)];
      if (p) return p;
      var yrs = Object.keys(h).map(Number).sort(function(a,b){return a-b;});
      for (var i = 0; i < yrs.length - 1; i++) {
        if (yrs[i] <= year && yrs[i+1] >= year) {
          var t = (year - yrs[i]) / (yrs[i+1] - yrs[i]);
          return h[String(yrs[i])] * (1-t) + h[String(yrs[i+1])] * t;
        }
      }
      return 0;
    }

    // ── Update display for a given year ──
    function updateYear(year) {
      var posAttr = geometry.getAttribute('position');
      var colorAttr = geometry.getAttribute('aColor');
      var sizeAttr = geometry.getAttribute('aSize');
      var alphaAttr = geometry.getAttribute('aAlpha');

      // Get dots for this year
      var yearDots;
      if (year > 2023) {
        // Future: generate based on scenario
        yearDots = generateFutureDots(year, currentScenario);
      } else {
        // Past: find closest year in pre-computed data
        var dataYears = Object.keys(allDots).map(Number).sort(function(a,b){return a-b;});
        var bestYear = dataYears[0];
        for (var j = 0; j < dataYears.length; j++) {
          if (dataYears[j] >= year) {
            bestYear = dataYears[j];
            if (j > 0 && (year - dataYears[j-1]) < (dataYears[j] - year)) bestYear = dataYears[j-1];
            break;
          }
        }
        if (year > dataYears[dataYears.length-1]) bestYear = dataYears[dataYears.length-1];
        yearDots = allDots[String(bestYear)] || [];
      }
      var nVisible = Math.min(yearDots.length, MAX_DOTS);

      // Era: ancient (<1800) vs modern (>=1800)
      var ancient = (year < 1800);
      material.uniforms.uWobble.value = 1.0;

      // Color
      var fireR = 1.0, fireG = 0.3, fireB = 0.05;
      var modernR = 1.0, modernG = 0.55, modernB = 0.15;
      var colorT = ancient ? 0 : Math.min(1, (year - 1800) / 150);

      // Pre-compute elderly % per country if age mode is on
      var countryElderly = null;
      if (showAge && year >= 1950) {
        countryElderly = {};
        COUNTRY_CODES.forEach(function(code, idx) {
          var m = modelData[code];
          if (!m) return;
          // Simple cohort: compute elderly fraction
          var le = m.l, tfr = m.t, slope = m.s, im = m.i;
          var young = m.p * (m.y0 || 0.2);
          var working = m.p * (1 - (m.y0 || 0.2) - (m.e0 || 0.05));
          var elderly = m.p * (m.e0 || 0.05);
          var targetYear = Math.min(year, 2100);
          for (var yr = 2024; yr <= targetYear; yr++) {
            var yearTfr = Math.max(0, tfr + slope * (yr - 2023));
            var deathRate = 1 / le;
            var fertilityRatio = yearTfr / 2.1;
            var births = (working + young * 0.3) * deathRate * fertilityRatio * (1 - im);
            var youngToWork = young / 15;
            var workToElder = working / 50;
            young = Math.max(0, young + births - youngToWork - young * deathRate * 0.3);
            working = Math.max(0, working + youngToWork - workToElder - working * deathRate * 0.5);
            elderly = Math.max(0, elderly + workToElder - elderly * deathRate * 2.5);
          }
          var total = young + working + elderly;
          countryElderly[idx] = total > 0 ? elderly / total : 0;
        });
      }

      for (var i = 0; i < nVisible; i++) {
        var pos = polar2Cartesian(yearDots[i][0], yearDots[i][1], 0.003);
        posAttr.array[i*3]   = pos[0];
        posAttr.array[i*3+1] = pos[1];
        posAttr.array[i*3+2] = pos[2];

        var cR, cG, cB;
        if (countryElderly && yearDots[i][2] !== undefined) {
          // Age coloring: elderly % → orange to blue-white
          var ePct = countryElderly[yearDots[i][2]] || 0;
          // 5-stop gradient: orange → gold → emerald → blue → purple
          var ageT = Math.min(1.0, Math.max(0, (ePct - 0.05) / 0.55)); // 5%→60%
          var stops = [
            [1.00, 0.40, 0.00],  // 0.0: #ff6600 orange
            [0.87, 0.80, 0.00],  // 0.25: #ddcc00 gold
            [0.27, 0.80, 0.53],  // 0.5: #44cc88 emerald
            [0.27, 0.53, 0.87],  // 0.75: #4488dd blue
            [0.53, 0.33, 0.80],  // 1.0: #8855cc purple
          ];
          var seg = ageT * 4; // 0..4
          var si = Math.min(3, Math.floor(seg));
          var sf = seg - si;
          cR = stops[si][0] * (1-sf) + stops[si+1][0] * sf;
          cG = stops[si][1] * (1-sf) + stops[si+1][1] * sf;
          cB = stops[si][2] * (1-sf) + stops[si+1][2] * sf;
          // Perceptual luminance compensation (ITU-R BT.709)
          // Keep perceived brightness equal to the orange stop
          var targetL = 0.2126 * stops[0][0] + 0.7152 * stops[0][1] + 0.0722 * stops[0][2]; // orange
          var currentL = 0.2126 * cR + 0.7152 * cG + 0.0722 * cB;
          if (currentL > 0.01) {
            var scale = Math.min(2.0, targetL / currentL);
            cR = Math.min(1.0, cR * scale);
            cG = Math.min(1.0, cG * scale);
            cB = Math.min(1.0, cB * scale);
          }
        } else {
          cR = fireR * (1-colorT) + modernR * colorT;
          cG = fireG * (1-colorT) + modernG * colorT;
          cB = fireB * (1-colorT) + modernB * colorT;
        }

        colorAttr.array[i*3]   = cR;
        colorAttr.array[i*3+1] = cG;
        colorAttr.array[i*3+2] = cB;
        sizeAttr.array[i] = 2.5;
        alphaAttr.array[i] = 0.8;
      }

      geometry.setDrawRange(0, nVisible);
      posAttr.needsUpdate = true;
      colorAttr.needsUpdate = true;
      sizeAttr.needsUpdate = true;
      alphaAttr.needsUpdate = true;

      // UI updates
      document.getElementById('year-label').textContent = formatYear(Math.round(year));
      var legendEl = document.getElementById('legend-label');
      var legendBase = t.dotLegend + (ancient ? t.dotLegendAncient : '');
      if (showAge && year >= 1950) {
        legendEl.innerHTML = legendBase + '<br>' + t.ageLegend;
      } else {
        legendEl.textContent = legendBase;
      }

      var worldPop;
      if (showMigration && year > 2023) {
        var migPop = computeAllFuturePop(year, currentScenario);
        worldPop = 0;
        COUNTRY_CODES.forEach(function(code) { worldPop += migPop[code] || 0; });
      } else {
        worldPop = getWorldPop(year);
      }
      document.getElementById('world-pop-label').textContent =
        worldPop > 0 ? '~' + formatPop(worldPop) : '';

      // Scenario & migration buttons: grey out for past
      var inFuture = year > 2023;
      document.querySelectorAll('.scenario-btn').forEach(function(btn) {
        btn.style.opacity = inFuture ? '' : '0.3';
        btn.style.pointerEvents = inFuture ? '' : 'none';
      });
      migrationBtn.style.opacity = inFuture ? '' : '0.3';
      migrationBtn.style.pointerEvents = inFuture ? '' : 'none';

      // ── Migration flow arcs ──
      if (showMigration && year > 2023) {
        var flows = getTopFlows(year, currentScenario, 25);
        var maxFlow = flows.length > 0 ? flows[0].amount : 1;
        var arcsData = flows.map(function(f) {
          var srcC = countryCoords[f.src];
          var dstC = countryCoords[f.dst];
          if (!srcC || !dstC) return null;
          var norm = f.amount / maxFlow; // 0..1
          return {
            startLat: srcC.lat,
            startLng: srcC.lon,
            endLat: dstC.lat,
            endLng: dstC.lon,
            color: 'rgba(255, 180, 80, ' + (0.15 + norm * 0.5) + ')',
            stroke: 0.3 + norm * 1.5,
            dashGap: 0.5,
            dashLength: 0.3,
            animateTime: 3000 - norm * 2000, // faster for larger flows
          };
        }).filter(Boolean);

        world
          .arcsData(arcsData)
          .arcStartLat('startLat').arcStartLng('startLng')
          .arcEndLat('endLat').arcEndLng('endLng')
          .arcColor('color')
          .arcStroke('stroke')
          .arcDashLength('dashLength')
          .arcDashGap('dashGap')
          .arcDashAnimateTime('animateTime');
      } else {
        world.arcsData([]);
      }
    }

    // ── Playback controls ──
    var currentIdx = startIdx;
    var currentYear = TIMELINE[currentIdx];
    var playing = false;
    var speed = 1;
    var lastTick = 0;
    var TICK_INTERVAL = 300;

    slider.addEventListener('input', function() {
      currentIdx = parseInt(slider.value);
      currentYear = TIMELINE[currentIdx];
      updateYear(currentYear);
    });

    function stepBy(delta) {
      currentIdx = Math.max(0, Math.min(TIMELINE.length - 1, currentIdx + delta));
      currentYear = TIMELINE[currentIdx];
      slider.value = currentIdx;
      updateYear(currentYear);
    }

    // Keyboard controls
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') { stepBy(-1); e.preventDefault(); }
      else if (e.key === 'ArrowRight') { stepBy(1); e.preventDefault(); }
      else if (e.key === ' ') { playBtn.click(); e.preventDefault(); }
      else if (e.key === 'r' || e.key === 'R') { rotateBtn.click(); }
    });

    var playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', function() {
      playing = !playing;
      playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
      if (playing) {
        if (currentIdx >= TIMELINE.length - 1) { currentIdx = 0; slider.value = 0; }
        lastTick = performance.now();
        requestAnimationFrame(animate);
      }
    });

    function animate() {
      if (!playing) return;
      var now = performance.now();
      if (now - lastTick >= TICK_INTERVAL) {
        currentIdx += speed;
        if (currentIdx >= TIMELINE.length) {
          currentIdx = TIMELINE.length - 1;
          playing = false;
          playBtn.innerHTML = '&#9654;';
        }
        currentYear = TIMELINE[currentIdx];
        slider.value = currentIdx;
        updateYear(currentYear);
        lastTick = now;
      }
      requestAnimationFrame(animate);
    }

    // Speed buttons
    document.querySelectorAll('.speed-btn:not(.scenario-btn)').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.speed-btn:not(.scenario-btn)').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        speed = parseInt(btn.dataset.speed);
      });
    });

    // ── Scenario-based future dot generation ──
    var currentScenario = 'linear';
    var N_PER_DOT = 50000;
    var REPLACEMENT_TFR = 2.1;
    var futureDotCache = {}; // scenario_year → dot array

    // Seeded random (deterministic per country+year)
    function seededRng(seed) {
      return function() {
        seed = (seed * 16807 + 0) % 2147483647;
        return seed / 2147483647;
      };
    }

    // Compute population for a country at a future year under a scenario
    function computeFuturePop(m, year, scenario) {
      var pop = m.p;
      var tfr0 = m.t, slope = m.s, le = m.l, im = m.i;
      var popCap = pop * 3;
      for (var yr = 2024; yr <= year; yr++) {
        var yearTfr;
        if (scenario === 'stable') yearTfr = tfr0;
        else if (scenario === 'soft') {
          var elapsed = yr - 2023;
          yearTfr = Math.max(0.8, tfr0 + slope * elapsed * Math.exp(-0.03 * elapsed));
        } else yearTfr = Math.max(0, tfr0 + slope * (yr - 2023));
        var deathRate = 1 / le;
        var birthRate = deathRate * (yearTfr / REPLACEMENT_TFR) * (1 - im);
        pop = pop * (1 + birthRate - deathRate);
        pop = Math.max(0, Math.min(pop, popCap));
      }
      return pop;
    }

    // Get 2023 dot positions per country (from allDots['2023'] or nearest)
    var baseDotsPerCountry = {};
    var baseYear = allDots['2023'] || allDots['2025'] || [];
    baseYear.forEach(function(d) {
      var cidx = d[2];
      if (!baseDotsPerCountry[cidx]) baseDotsPerCountry[cidx] = [];
      baseDotsPerCountry[cidx].push([d[0], d[1]]);
    });

    var showMigration = false;

    function generateFutureDots(year, scenario) {
      var cacheKey = scenario + '_' + (showMigration ? 'mig' : 'nomig') + '_' + year;
      if (futureDotCache[cacheKey]) return futureDotCache[cacheKey];

      var migPop = showMigration ? computeAllFuturePop(year, scenario) : null;

      var result = [];
      COUNTRY_CODES.forEach(function(code, cidx) {
        var m = modelData[code];
        if (!m) return;
        var pop = migPop ? (migPop[code] || 0) : computeFuturePop(m, year, scenario);
        var nDots = Math.floor(pop / N_PER_DOT);
        if (nDots < 1) return;

        // Use base dot positions as seeds
        var baseDots = baseDotsPerCountry[cidx] || [];
        if (baseDots.length === 0) return;

        var rng = seededRng(cidx * 31337 + year);
        // Match packed data: it was downsampled by half (dots[::2])
        // So use same ratio: actual = nDots / 2
        var actualDots = Math.max(1, Math.floor(nDots / 2));

        for (var i = 0; i < actualDots; i++) {
          var base = baseDots[i % baseDots.length];
          // Small offset to avoid exact overlap, preserve city clustering
          var dlat = (rng() - 0.5) * 0.3;
          var dlon = (rng() - 0.5) * 0.3;
          result.push([
            Math.round((base[0] + dlat) * 10) / 10,
            Math.round((base[1] + dlon) * 10) / 10,
            cidx
          ]);
        }
      });

      futureDotCache[cacheKey] = result;
      return result;
    }

    // Scenario buttons
    var infoLabel = document.getElementById('info-label');
    var SCENARIOS = {
      linear: t.scenarioLinear,
      stable: t.scenarioStable,
      soft:   t.scenarioSoft,
    };
    document.querySelectorAll('.scenario-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.scenario-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentScenario = btn.dataset.scenario;
        futureDotCache = {};
        migrationPopCache = {};
        migrationFlowCache = {};
        infoLabel.textContent = SCENARIOS[currentScenario];
        updateYear(currentYear);
      });
    });
    infoLabel.textContent = SCENARIOS['linear'];

    // Settings panel toggle
    var settingsPanel = document.getElementById('settings-panel');
    document.getElementById('settings-btn').addEventListener('click', function() {
      settingsPanel.classList.toggle('hidden');
    });

    // Age coloring toggle
    var showAge = true;
    var ageBtn = document.getElementById('age-btn');
    ageBtn.style.color = '#fff';
    ageBtn.addEventListener('click', function() {
      showAge = !showAge;
      ageBtn.style.color = showAge ? '#fff' : '';
      updateYear(currentYear);
    });

    // Migration toggle
    var migrationBtn = document.getElementById('migration-btn');
    migrationBtn.addEventListener('click', function() {
      showMigration = !showMigration;
      migrationBtn.style.color = showMigration ? '#fff' : '';
      futureDotCache = {};
      updateYear(currentYear);
    });

    // Rotate toggle
    var rotateBtn = document.getElementById('rotate-btn');
    var rotating = true;
    rotateBtn.style.color = '#fff';
    rotateBtn.addEventListener('click', function() {
      rotating = !rotating;
      if (controls) controls.autoRotate = rotating;
      rotateBtn.style.color = rotating ? '#fff' : '';
    });

    // Wobble animation
    function wobbleLoop() {
      material.uniforms.uTime.value = performance.now() / 1000;
      requestAnimationFrame(wobbleLoop);
    }
    wobbleLoop();

    // Ready
    updateYear(currentYear);
    document.getElementById('loading').classList.add('hidden');
    console.log('Ready: ' + MAX_DOTS + ' max dots, ' + TIMELINE.length + ' timeline points');

  }).catch(function(err) {
    console.error('Load error:', err);
    document.querySelector('.loading-text').textContent = 'Error: ' + err.message;
  });

})();
</script>
</body>
</html>
